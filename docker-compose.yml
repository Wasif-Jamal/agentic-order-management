version: "3.9"

services:

  app:
    build: .
    container_name: agentic-order-management-app

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest

    container_name: qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: